services:
  main-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: gustaw
      POSTGRES_PASSWORD: gustawpassword
      POSTGRES_DB: gustawdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  prisma-migrate:
    image: node:20
    depends_on:
      - main-db
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: "postgresql://gustaw:gustawpassword@main-db:5432/gustawdb"
    command: sh -c "npm install && npx prisma migrate deploy || npx prisma db push"
volumes:
  pgdata:
