version: "3.8"

services:
  postgres:
    image: postgres:17
    container_name: gustaw-fin-db
    environment:
      POSTGRES_DB: gustaw_fin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
